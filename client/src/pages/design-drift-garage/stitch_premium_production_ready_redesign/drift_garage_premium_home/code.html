<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Drift Garage | Premium Die-Cast Models</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            driftdark: '#0a0a0a',
            driftslate: '#171717',
            driftaccent: '#06b6d4', // Cyan
            driftaccenthover: '#22d3ee',
          }
        }
      }
    }
  </script>
<!-- Custom Styles for Animations & Layout Details -->
<style data-purpose="animations-and-utilities">
    /* Entrance Animations */
    .animate-fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    .delay-400 { animation-delay: 400ms; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Refined Button Hover Glow */
    .btn-glow-hover:hover {
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
    }
    
    /* Logo specific styling to match original intent without a specific font file */
    .brand-logo {
      font-style: italic;
      letter-spacing: -0.05em;
    }
  </style>
<!-- Icons (FontAwesome placeholder for simplicity, using SVG directly is better but this is concise) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-driftdark text-white font-sans antialiased overflow-x-hidden">
<!-- BEGIN: Main Header -->
<header class="absolute top-0 left-0 w-full z-50 px-6 py-8 md:px-12 lg:px-24 flex justify-between items-center bg-gradient-to-b from-black/60 to-transparent">
<!-- Logo & Main Nav Container -->
<div class="flex items-center gap-12">
<!-- Brand Logo -->
<a class="text-3xl font-black brand-logo tracking-tighter text-white" href="#">
        Drift Garage
      </a>
<!-- Desktop Navigation -->
<nav class="hidden md:block">
<ul class="flex gap-8 text-sm font-medium text-gray-400">
<li><a class="hover:text-white transition-colors duration-300" href="#">Shop</a></li>
<li><a class="hover:text-white transition-colors duration-300" href="#">Garage</a></li>
</ul>
</nav>
</div>
<!-- User Actions (Search, Cart, Profile) -->
<div class="flex items-center gap-6 text-gray-400">
<button aria-label="Search" class="hover:text-white transition-colors duration-300">
<i class="fa-solid fa-magnifying-glass"></i>
</button>
<!-- Cart Icon with Badge -->
<button aria-label="Cart" class="relative hover:text-white transition-colors duration-300">
<i class="fa-solid fa-cart-shopping"></i>
<span class="absolute -top-1 -right-2 bg-orange-500 w-2 h-2 rounded-full"></span>
</button>
<!-- User Profile Icon -->
<button aria-label="User Profile" class="w-8 h-8 rounded-full bg-gray-800 border border-gray-700 flex items-center justify-center hover:bg-gray-700 hover:text-white transition-colors duration-300">
<i class="fa-regular fa-user text-sm"></i>
</button>
</div>
</header>
<!-- END: Main Header -->
<!-- BEGIN: Hero Section -->
<main>
<section class="relative min-h-screen flex items-center w-full">
<!-- Background Image Container -->
<!-- The provided image contains UI elements, so we use a heavy gradient on the left to mask them and highlight the car on the right -->
<div class="absolute inset-0 z-0 overflow-hidden bg-driftdark">
<img alt="Dark supercar background" class="w-full h-full object-cover object-right opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABDnjgbExWtKQAnQVbLGrSyxNwCrECGV1Td8v_B60FYiJsUa4RXufZFJoIHCVJ1H4RV-8AEp6Sa3AjNXdrr8xXGLdBEniVmluWtfeW4xlaWloIkar1NcAwSgbAYgPd8hFFI76nrTjPThi8vHfZbXrLeMviU3nw9FbLcBnmd5aSceIce6_4x5zNvCe5IgB_Vj9WcXEZvF83IWrHrVRFiDNw3KoneSL71NwhM64zjqF_owpLWCH4WF-VbzX5xLzEIViCYaggsbbo-n38"/>
</div>
<!-- Gradient Overlay for Depth and Text Readability -->
<!-- The gradient goes from solid dark left to transparent right to hide the original image's text -->
<div class="absolute inset-0 z-10 bg-gradient-to-r from-driftdark via-driftdark/95 md:via-driftdark/80 to-transparent"></div>
<!-- Vignette effect for a more cinematic feel -->
<div class="absolute inset-0 z-10 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-transparent via-driftdark/20 to-driftdark pointer-events-none"></div>
<!-- Content Container -->
<div class="relative z-20 w-full px-6 md:px-12 lg:px-24 mx-auto max-w-7xl">
<div class="max-w-2xl">
<!-- Main Headline -->
<h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold leading-[1.1] tracking-tight mb-6 text-white drop-shadow-lg animate-fade-in-up delay-100">
            Collect Speed.<br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">Own Legends.</span>
</h1>
<!-- Subheadline/Description -->
<p class="text-lg md:text-xl text-gray-300 font-light leading-relaxed mb-10 max-w-lg animate-fade-in-up delay-200">
            The ultimate destination for premium die-cast models. Discover rare finds, exclusive pre-orders, and elite collections curated for serious enthusiasts.
          </p>
<!-- Call to Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 animate-fade-in-up delay-300">
<!-- Primary CTA -->
<a class="inline-flex justify-center items-center px-8 py-4 bg-driftaccent text-driftdark font-semibold rounded-md transition-all duration-300 hover:bg-driftaccenthover hover:-translate-y-0.5 btn-glow-hover" href="#">
              Explore Collection
            </a>
<!-- Secondary CTA -->
<a class="inline-flex justify-center items-center px-8 py-4 bg-white/5 backdrop-blur-sm border border-white/10 text-white font-medium rounded-md transition-all duration-300 hover:bg-white/10 hover:border-white/20" href="#">
              New Arrivals
            </a>
</div>
</div>
</div>
</section>
</main>
<!-- END: Hero Section -->
</body></html>
